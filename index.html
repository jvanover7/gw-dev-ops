/* ════ ACCESS GATE ════ */
function AccessGate() {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  const tryAccess = () => {
    if (pin === VIEWER_KEY || pin === ADMIN_KEY) {
      window.location.search = "?key=" + pin;
    } else { setErr(true); setTimeout(() => setErr(false), 2000); }
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f6f7fb",fontFamily:ff}}>
      <div style={{background:"#fff",borderRadius:16,padding:"40px 36px",width:360,maxWidth:"90vw",boxShadow:"0 8px 30px rgba(0,0,0,0.08)",textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:8}}>🔒</div>
        <h2 style={{fontSize:18,fontWeight:800,color:C.dark,marginBottom:4}}>GreenWorks Dev Ops</h2>
        <p style={{fontSize:12,color:C.sub,marginBottom:24}}>This board is invite-only. Enter your access code or ask your admin for a link.</p>
        <input value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")tryAccess();}} placeholder="Access code" type="password"
          style={{width:"100%",padding:"12px 16px",borderRadius:10,border:`2px solid ${err?C.red:C.border}`,fontSize:14,fontFamily:ff,outline:"none",textAlign:"center",marginBottom:12,transition:"border 0.2s"}} autoFocus />
        <button onClick={tryAccess} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:C.navy,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:ff}}>Enter</button>

/* ════ CALENDAR ════ */
function CalPicker({anchor,val,onPick,onClear,onClose}){
  const p=parseDate(val);const today=new Date();
  const[mo,setMo]=useState(p?p.getMonth():today.getMonth());
  const[yr,setYr]=useState(p?p.getFullYear():today.getFullYear());
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};const t=setTimeout(()=>document.addEventListener("mousedown",h),20);return()=>{clearTimeout(t);document.removeEventListener("mousedown",h);};},[onClose]);
  const prev=()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);};
  const next=()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);};
  const fd=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const isSel=d=>p&&p.getDate()===d&&p.getMonth()===mo&&p.getFullYear()===yr;
  const isToday=d=>d&&today.getDate()===d&&today.getMonth()===mo&&today.getFullYear()===yr;
  const st={position:"fixed",zIndex:9999};
  if(anchor){const sb=window.innerHeight-anchor.bottom;if(sb<340)st.bottom=window.innerHeight-anchor.top+4;else st.top=anchor.bottom+4;st.left=Math.min(anchor.left,window.innerWidth-280);}
  return(
    <div ref={ref} style={{...st,background:C.white,borderRadius:12,border:`1px solid ${C.border}`,boxShadow:"0 12px 48px rgba(0,0,0,0.16)",width:264,fontFamily:ff,animation:"fadeUp 0.15s ease"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px 8px"}}>
        <button onClick={prev} style={{background:"none",border:"none",fontSize:18,color:C.sub,cursor:"pointer",width:28,height:28,borderRadius:6}}>‹</button>
        <span style={{fontSize:13,fontWeight:700,color:C.dark}}>{MONTHS[mo]} {yr}</span>
        <button onClick={next} style={{background:"none",border:"none",fontSize:18,color:C.sub,cursor:"pointer",width:28,height:28,borderRadius:6}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 10px"}}>{DAYS_H.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#bbb",padding:"4px 0"}}>{d}</div>)}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"2px 10px 8px",gap:2}}>
        {cells.map((d,i)=><div key={i} onClick={()=>{if(d)onPick(fmtDate(new Date(yr,mo,d)));}} style={{textAlign:"center",fontSize:12,fontWeight:isSel(d)?700:isToday(d)?600:400,padding:"7px 0",borderRadius:8,cursor:d?"pointer":"default",background:isSel(d)?C.navy:"transparent",color:isSel(d)?"#fff":isToday(d)?C.navy:d?C.dark:"transparent",border:isToday(d)&&!isSel(d)?`1.5px solid ${C.navy}30`:"1.5px solid transparent"}} onMouseEnter={e=>{if(d&&!isSel(d))e.currentTarget.style.background="#f0f1f5";}} onMouseLeave={e=>{if(d&&!isSel(d))e.currentTarget.style.background="transparent";}}>{d||""}</div>)}
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,padding:"8px 12px",display:"flex",justifyContent:"space-between"}}>
        <button onClick={()=>onPick(fmtDate(today))} style={{background:"none",border:"none",fontSize:11,fontWeight:600,cursor:"pointer",padding:"4px 8px",color:C.navy,fontFamily:"inherit"}}>Today</button>
        <button onClick={onClear} style={{background:"none",border:"none",fontSize:11,fontWeight:600,cursor:"pointer",padding:"4px 8px",color:C.red,fontFamily:"inherit"}}>Set TBD</button>
      </div>
    </div>
  );
}

/* ════ ADD FORM ════ */

          <div><label style={{display:"block",fontSize:11,fontWeight:600,color:C.sub,marginBottom:4,textTransform:"uppercase"}}>Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={type==="product"?"e.g. Client Portal":"e.g. Dark Mode"} style={inputStyle} autoFocus/></div>

            {type==="feature"&&<div style={{flex:1}}><label style={{display:"block",fontSize:11,fontWeight:600,color:C.sub,marginBottom:4,textTransform:"uppercase"}}>Target</label><input value={target} onChange={e=>setTarget(e.target.value)} placeholder="TBD" style={inputStyle}/></div>}

/* ════ MAIN APP ════ */
function Board({isAdmin}){
  const[products,setProducts]=useState(INIT);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{fetchBoard().then(d=>{if(d&&d.length>0){setProducts(d);setOpenG(prev=>{const m={...prev};d.forEach(p=>{if(!(p.id in m))m[p.id]=true;});return m;});}setLoading(false);}).catch(()=>setLoading(false));},[]);
  const[openG,setOpenG]=useState(()=>{const m={};INIT.forEach(p=>m[p.id]=true);return m;});

  const persist=useCallback(d=>{setProducts(d);try{localStorage.setItem("gw-ops-data",JSON.stringify(d));}catch(e){}},[]);
  useEffect(()=>{const iv=setInterval(()=>{fetchBoard().then(d=>{if(d&&d.length>0)setProducts(d);});},30000);return()=>clearInterval(iv);},[]);

  useEffect(()=>{if(!toast)return;const t=setTimeout(()=>setToast(null),2500);return()=>clearTimeout(t);},[toast]);

    if(!chatMsg.trim()||chatBusy)return;const msg=chatMsg.trim();setChatMsg("");setChatHist(h=>[...h,{r:"u",t:msg}]);setChatBusy(true);
    try{
      const st=products.map(p=>({id:p.id,name:p.name,features:p.features.map((f,i)=>({i,n:f.n,s:f.s,t:f.t}))}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"Project board. State:\\n"+JSON.stringify(st)+"\\nStatuses: planning,in-dev,testing,rollout,complete,blocked\\nJSON only:\\n{\"updates\":[{\"productId\":\"x\",\"featureIndex\":0,\"field\":\"s\",\"value\":\"complete\"}],\"message\":\"text\"}\\nFields: s,t,d,n. Add: {\"productId\":\"x\",\"action\":\"add\",\"feature\":{\"n\":\"X\",\"s\":\"planning\",\"t\":\"TBD\",\"d\":\"X\"}}\\nDates: \\\"May 15, 2026\\\". Unclear: {\"updates\":[],\"message\":\"response\"}",messages:[{role:"user",content:msg}]})});
      const data=await res.json();const raw=data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();const parsed=JSON.parse(raw);
      if(parsed.updates?.length>0){let up=products.map(p=>({...p,features:p.features.map(f=>({...f}))}));for(const u of parsed.updates){const pi=up.findIndex(p=>p.id===u.productId);if(pi<0)continue;if(u.action==="add"&&u.feature)up[pi].features.push(u.feature);else if(u.featureIndex!=null&&u.field&&up[pi].features[u.featureIndex])up[pi].features[u.featureIndex][u.field]=u.value;}persist(up);show(parsed.updates.length+" update(s) applied");}
      setChatHist(h=>[...h,{r:"a",t:parsed.message||"Done."}]);

          <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.border}`,boxShadow:"0 10px 40px rgba(0,0,0,0.15)",overflow:"hidden",minWidth:150}}>
            <div style={{padding:"8px 12px 4px",fontSize:10,fontWeight:700,color:"#aaa",textTransform:"uppercase"}}>Change status</div>
            {S_ORDER.map(sk=>(<div key={sk} onClick={()=>changeSt(dropdown.pid,dropdown.fi,sk)} style={{padding:"9px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,background:cs===sk?"#f5f6f8":"transparent",transition:"background 0.1s"}} onMouseEnter={e=>{e.currentTarget.style.background="#f0f1f5";}} onMouseLeave={e=>{e.currentTarget.style.background=cs===sk?"#f5f6f8":"transparent";}}><div style={{width:12,height:12,borderRadius:4,background:STATUS[sk].bg}}/><span style={{fontSize:13,color:C.dark,fontWeight:cs===sk?700:500}}>{STATUS[sk].label}</span>{cs===sk&&<span style={{marginLeft:"auto",color:C.green}}>✓</span>}</div>))}
          </div>
        </div>);})()}

      {isAdmin&&calendar&&(()=>{const p=products.find(x=>x.id===calendar.pid);return<CalPicker anchor={calendar.rect} val={p?.features[calendar.fi]?.t} onPick={v=>setDt(calendar.pid,calendar.fi,v)} onClear={()=>setDt(calendar.pid,calendar.fi,"TBD")} onClose={()=>setCalendar(null)}/>;})()}

      {showActivity&&<><div onClick={()=>setShowActivity(false)} style={{position:"fixed",inset:0,zIndex:9997,background:"rgba(0,0,0,0.2)"}}/><ActivityPanel onClose={()=>setShowActivity(false)}/></>}
      {isAdmin&&showShare&&<ShareModal onClose={()=>setShowShare(false)}/>}
      {isAdmin&&addForm&&<AddForm type={addForm} products={products} onSubmit={addForm==="product"?addProduct:addFeature} onCancel={()=>setAddForm(null)}/>}

      {toast&&<div style={{position:"fixed",bottom:chatOpen?340:70,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:C.dark,color:"#fff",padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 6px 20px rgba(0,0,0,0.2)",animation:"toastIn 0.2s ease"}}>✓ {toast}</div>}

      {/* CHAT — admin only */}
      {isAdmin&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50}}>
          {!chatOpen?(
            <div onClick={()=>setChatOpen(true)} style={{background:C.white,borderTop:`1px solid ${C.border}`,padding:"10px 24px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onMouseEnter={e=>{e.currentTarget.style.background="#f8f9fb";}} onMouseLeave={e=>{e.currentTarget.style.background=C.white;}}>
              <span>💬</span><span style={{fontSize:13,color:C.sub}}>Update board with AI assistant</span>
            </div>
          ):(
            <div style={{background:C.white,borderTop:`1px solid ${C.border}`,boxShadow:"0 -6px 24px rgba(0,0,0,0.08)",display:"flex",flexDirection:"column",height:320}}>
              <div style={{padding:"10px 18px",borderBottom:"1px solid #f0f1f5",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
                <span style={{fontSize:13,fontWeight:700,color:C.dark}}>💬 Board Assistant</span>
                <button onClick={()=>setChatOpen(false)} style={{background:"#f0f1f5",border:"none",width:26,height:26,borderRadius:6,fontSize:14,color:C.sub,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
              <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:8}}>
                {chatHist.length===0&&<div style={{padding:"16px 0",textAlign:"center",fontSize:12,color:"#bbb",lineHeight:1.7}}>Try: <b style={{color:C.sub}}>"Mark ISN push as complete"</b></div>}
                {chatHist.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start"}}><div style={{maxWidth:"80%",padding:"9px 14px",borderRadius:14,background:m.r==="u"?C.navy:"#f0f1f5",color:m.r==="u"?"#fff":C.dark,fontSize:13,lineHeight:1.5,borderBottomRightRadius:m.r==="u"?4:14,borderBottomLeftRadius:m.r==="u"?14:4}}>{m.t}</div></div>)}
                {chatBusy&&<div style={{display:"flex",gap:4,padding:"8px 0"}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.navy,animation:`dotPulse 1s ease ${i*0.2}s infinite`}}/>)}</div>}
                <div ref={chatEnd}/>
              </div>
              <div style={{padding:"10px 18px 14px",borderTop:"1px solid #f0f1f5",display:"flex",gap:8,flexShrink:0}}>
                <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}} placeholder="Tell me what to update..." style={{flex:1,padding:"10px 14px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:ff,outline:"none"}} onFocus={e=>{e.target.style.borderColor=C.navy;}} onBlur={e=>{e.target.style.borderColor=C.border;}}/>
                <button onClick={sendChat} disabled={chatBusy||!chatMsg.trim()} style={{padding:"10px 18px",borderRadius:8,border:"none",background:chatMsg.trim()?C.navy:"#ddd",color:"#fff",fontSize:13,fontWeight:700,cursor:chatMsg.trim()?"pointer":"default",fontFamily:ff}}>Send</button>
              </div>
            </div>
          )}
        </div>
      )}

      <footer style={{padding:"12px 28px 20px",textAlign:"center",fontSize:10,color:"#ccc",fontFamily:fm}}>
        GreenWorks Inspections & Engineering · Updated {new Date().toLocaleDateString("en-US")}
      </footer>
    </div>
  );
}

function FPill({label,count,active,onClick,color}){return<button onClick={onClick} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:18,background:active?color+"12":"transparent",border:`1.5px solid ${active?color:"#e0e3e9"}`,cursor:"pointer",fontFamily:ff}}><span style={{fontSize:14,fontWeight:800,color:active?color:C.sub,fontFamily:fm}}>{count}</span><span style={{fontSize:10,fontWeight:600,color:active?color:C.sub}}>{label}</span></button>;}
function Bat({pct,color,wide}){return<div style={{width:wide?72:52,height:wide?9:6,borderRadius:4,background:"#ecedf0",overflow:"hidden",flexShrink:0}}><div style={{width:pct+"%",height:"100%",borderRadius:4,background:pct===100?C.green:color,transition:"width 0.4s"}}/></div>;}
function MiniBar({phase}){const steps=["planning","in-dev","testing","rollout","complete"];const bl=phase==="blocked";const idx=bl?-1:steps.indexOf(phase);return<div style={{display:"flex",gap:2}}>{steps.map((s,i)=><div key={s} style={{width:11,height:5,borderRadius:2,background:!bl&&i<=idx?(i===idx?STATUS[phase].bg:STATUS[phase].bg+"50"):"#ecedf0"}}/>)}{bl&&<div style={{width:11,height:5,borderRadius:2,background:C.red}}/>}</div>;}
const colH={fontSize:9,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.05em"};
const addBtnStyle={padding:"5px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,background:"transparent",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:ff,color:C.sub};

/* ════ ROOT ════ */
function Root(){
  const access=getAccessLevel();
  if(!access)return <AccessGate/>;
  return <Board isAdmin={access==="admin"}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
